<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ff7043">
<title>Что поесть?</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(180deg, #fff3e0 0%, #ffe0b2 100%);
    min-height: 100vh;
    color: #3e2723;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    max-width: 520px;
    margin: 0 auto;
    padding: 20px 16px 80px;
    min-height: 100vh;
  }
  h1 {
    text-align: center;
    font-size: 28px;
    margin: 8px 0 20px;
    color: #bf360c;
    font-weight: 700;
  }
  .tabs {
    display: flex;
    gap: 8px;
    background: #fff;
    padding: 6px;
    border-radius: 16px;
    box-shadow: 0 2px 8px rgba(191, 54, 12, 0.08);
    margin-bottom: 20px;
  }
  .tab {
    flex: 1;
    padding: 14px 12px;
    border: none;
    background: transparent;
    font-size: 17px;
    font-weight: 600;
    color: #8d6e63;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active {
    background: linear-gradient(135deg, #ff7043, #ff5722);
    color: white;
    box-shadow: 0 4px 12px rgba(255, 87, 34, 0.35);
  }
  .suggestion-card {
    background: white;
    border-radius: 24px;
    padding: 32px 20px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(191, 54, 12, 0.1);
    margin-bottom: 16px;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: transform 0.2s;
  }
  .suggestion-card.animate { transform: scale(1.02); }
  .suggestion-label {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #a1887f;
    margin-bottom: 12px;
    font-weight: 600;
  }
  .suggestion-dish {
    font-size: 26px;
    font-weight: 700;
    color: #3e2723;
    line-height: 1.3;
    min-height: 34px;
  }
  .suggestion-dish.empty {
    font-size: 17px;
    color: #a1887f;
    font-weight: 500;
  }
  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-appearance: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, #ff7043, #ff5722);
    color: white;
    box-shadow: 0 4px 12px rgba(255, 87, 34, 0.35);
    margin-bottom: 10px;
  }
  .btn-primary:active { transform: scale(0.98); box-shadow: 0 2px 6px rgba(255, 87, 34, 0.3); }
  .btn-secondary {
    background: white;
    color: #5d4037;
    border: 2px solid #ffccbc;
    margin-bottom: 10px;
  }
  .btn-secondary:active { background: #fff3e0; }
  .btn-ghost {
    background: transparent;
    color: #8d6e63;
    padding: 10px;
    font-size: 15px;
    font-weight: 500;
  }
  .row { display: flex; gap: 10px; margin-bottom: 10px; }
  .row .btn { margin-bottom: 0; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(62, 39, 35, 0.55);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
    animation: fade 0.2s;
  }
  .modal-overlay.open { display: flex; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: white;
    width: 100%;
    max-width: 520px;
    border-radius: 24px 24px 0 0;
    padding: 20px;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.25s;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #ffe0b2;
  }
  .modal-title {
    font-size: 20px;
    font-weight: 700;
    color: #3e2723;
  }
  .close-btn {
    background: #ffe0b2;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    color: #5d4037;
  }
  .dish-list { list-style: none; padding: 0; margin: 0; }
  .dish-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 12px;
    border-radius: 12px;
    margin-bottom: 6px;
    background: #fff8f3;
    cursor: pointer;
    transition: background 0.15s;
  }
  .dish-item:active { background: #ffe0b2; }
  .dish-info { flex: 1; min-width: 0; }
  .dish-name {
    font-size: 16px;
    font-weight: 600;
    color: #3e2723;
    word-break: break-word;
  }
  .dish-tags {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }
  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tag-lunch { background: #ffe0b2; color: #bf360c; }
  .tag-dinner { background: #d1c4e9; color: #4527a0; }
  .delete-btn {
    background: transparent;
    border: none;
    font-size: 18px;
    color: #bf360c;
    cursor: pointer;
    padding: 8px 12px;
    opacity: 0.5;
  }
  .delete-btn:active { opacity: 1; }

  /* Form */
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #5d4037;
    margin-bottom: 6px;
  }
  .form-input {
    width: 100%;
    padding: 14px;
    border: 2px solid #ffccbc;
    border-radius: 12px;
    font-size: 16px;
    background: #fff8f3;
    color: #3e2723;
    -webkit-appearance: none;
  }
  .form-input:focus {
    outline: none;
    border-color: #ff7043;
    background: white;
  }
  .checkbox-group {
    display: flex;
    gap: 10px;
  }
  .checkbox-label {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px;
    background: #fff8f3;
    border: 2px solid #ffccbc;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    color: #8d6e63;
    user-select: none;
    transition: all 0.15s;
  }
  .checkbox-label input { display: none; }
  .checkbox-label.checked {
    background: #ff7043;
    border-color: #ff7043;
    color: white;
  }
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #a1887f;
  }
  .hint {
    text-align: center;
    font-size: 13px;
    color: #a1887f;
    margin-top: 14px;
  }
</style>
</head>
<body>
<div class="app">
  <h1>🍽 Что поесть?</h1>

  <div class="tabs">
    <button class="tab active" data-meal="lunch">☀️ Обед</button>
    <button class="tab" data-meal="dinner">🌙 Ужин</button>
  </div>

  <div class="suggestion-card" id="suggestionCard">
    <div class="suggestion-label" id="suggestionLabel">Нажми предложи</div>
    <div class="suggestion-dish empty" id="suggestionDish">Что сегодня на обед?</div>
  </div>

  <button class="btn btn-primary" id="suggestBtn">🎲 Предложи!</button>

  <div class="row">
    <button class="btn btn-secondary" id="listBtn">📋 Весь список</button>
    <button class="btn btn-secondary" id="addBtn">➕ Добавить</button>
  </div>

  <div class="hint" id="hint"></div>
</div>

<!-- List modal -->
<div class="modal-overlay" id="listModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Все блюда</div>
      <button class="close-btn" data-close="listModal">✕</button>
    </div>
    <ul class="dish-list" id="dishList"></ul>
  </div>
</div>

<!-- Add modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Новое блюдо</div>
      <button class="close-btn" data-close="addModal">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Название</label>
      <input type="text" class="form-input" id="newDishName" placeholder="например, борщ" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">Когда предлагать</label>
      <div class="checkbox-group">
        <label class="checkbox-label checked" id="lunchCheckLabel">
          <input type="checkbox" id="lunchCheck" checked>
          ☀️ Обед
        </label>
        <label class="checkbox-label" id="dinnerCheckLabel">
          <input type="checkbox" id="dinnerCheck">
          🌙 Ужин
        </label>
      </div>
    </div>
    <button class="btn btn-primary" id="saveBtn">Сохранить</button>
    <button class="btn btn-ghost" data-close="addModal">Отмена</button>
  </div>
</div>

<script>
  // ---------- Seed data ----------
  const DEFAULT_DISHES = [
    { name: "тыквенный суп",           lunch: true,  dinner: false },
    { name: "греческий салат",         lunch: true,  dinner: false },
    { name: "макароны с филе",         lunch: true,  dinner: false },
    { name: "пельмени",                lunch: true,  dinner: false },
    { name: "булгур с мясом",          lunch: true,  dinner: false },
    { name: "гречка с мясом",          lunch: true,  dinner: false },
    { name: "заказать роллы",          lunch: true,  dinner: true  },
    { name: "заказать пиццу",          lunch: true,  dinner: true  },
    { name: "заказать бургеры",        lunch: true,  dinner: true  },
    { name: "заказать вафли",          lunch: true,  dinner: false },
    { name: "заказать грузинскую кухню", lunch: true, dinner: true },
    { name: "пожарить овощную смесь с мясом", lunch: true, dinner: false },
    { name: "плов",                    lunch: true,  dinner: false },
    { name: "рис с курицей",           lunch: true,  dinner: false },
    { name: "котлеты с пюре",          lunch: true,  dinner: false },
    { name: "лазанья",                 lunch: true,  dinner: false },
    { name: "салат с тунцом",          lunch: true,  dinner: false },
    { name: "пожарить сырники",        lunch: false, dinner: true  },
    { name: "пожарить оладьи",         lunch: false, dinner: true  },
    { name: "посмотреть что осталось с обеда", lunch: false, dinner: true },
    { name: "жареные овощи с мясом",   lunch: false, dinner: true  },
    { name: "омлет",                   lunch: false, dinner: true  },
  ];

  const STORAGE_KEY = "food_app_dishes_v1";

  // ---------- State ----------
  let dishes = loadDishes();
  let currentMeal = "lunch"; // "lunch" | "dinner"
  let lastSuggested = null;

  // ---------- Persistence ----------
  function loadDishes() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) { console.warn("load error", e); }
    return [...DEFAULT_DISHES];
  }
  function saveDishes() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(dishes)); }
    catch (e) { console.warn("save error", e); }
  }

  // ---------- Rendering ----------
  const $ = (id) => document.getElementById(id);

  function filterForMeal(meal) {
    return dishes.filter(d => meal === "lunch" ? d.lunch : d.dinner);
  }

  function suggest() {
    const pool = filterForMeal(currentMeal);
    if (pool.length === 0) {
      $("suggestionLabel").textContent = "Список пуст";
      $("suggestionDish").textContent = "Добавь блюдо";
      $("suggestionDish").classList.add("empty");
      return;
    }
    // Avoid repeating the same dish twice if possible
    let pick;
    if (pool.length > 1 && lastSuggested) {
      const filtered = pool.filter(d => d.name !== lastSuggested);
      pick = filtered[Math.floor(Math.random() * filtered.length)];
    } else {
      pick = pool[Math.floor(Math.random() * pool.length)];
    }
    lastSuggested = pick.name;

    const label = currentMeal === "lunch" ? "На обед" : "На ужин";
    $("suggestionLabel").textContent = label;
    const dishEl = $("suggestionDish");
    dishEl.textContent = pick.name;
    dishEl.classList.remove("empty");

    const card = $("suggestionCard");
    card.classList.add("animate");
    setTimeout(() => card.classList.remove("animate"), 200);
  }

  function renderTabs() {
    document.querySelectorAll(".tab").forEach(t => {
      t.classList.toggle("active", t.dataset.meal === currentMeal);
    });
    // Reset card when switching
    const label = currentMeal === "lunch" ? "Нажми предложи" : "Нажми предложи";
    const placeholder = currentMeal === "lunch" ? "Что сегодня на обед?" : "Что сегодня на ужин?";
    $("suggestionLabel").textContent = label;
    const dishEl = $("suggestionDish");
    dishEl.textContent = placeholder;
    dishEl.classList.add("empty");
    lastSuggested = null;
    updateSuggestBtn();
    updateHint();
  }

  function updateSuggestBtn() {
    const pool = filterForMeal(currentMeal);
    $("suggestBtn").textContent = lastSuggested ? "🔄 Другой вариант" : "🎲 Предложи!";
    $("suggestBtn").disabled = pool.length === 0;
    $("suggestBtn").style.opacity = pool.length === 0 ? "0.5" : "1";
  }

  function updateHint() {
    const pool = filterForMeal(currentMeal);
    $("hint").textContent = `${pool.length} вариант${pluralize(pool.length)} в списке`;
  }
  function pluralize(n) {
    const mod10 = n % 10, mod100 = n % 100;
    if (mod10 === 1 && mod100 !== 11) return "";
    if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return "а";
    return "ов";
  }

  function renderList() {
    const list = $("dishList");
    list.innerHTML = "";
    if (dishes.length === 0) {
      list.innerHTML = '<div class="empty-state">Список пуст.<br>Добавь первое блюдо!</div>';
      return;
    }
    // Sort by name
    const sorted = [...dishes].sort((a, b) => a.name.localeCompare(b.name, "ru"));
    sorted.forEach((dish) => {
      const idx = dishes.indexOf(dish);
      const li = document.createElement("li");
      li.className = "dish-item";
      const tags = [];
      if (dish.lunch) tags.push('<span class="tag tag-lunch">обед</span>');
      if (dish.dinner) tags.push('<span class="tag tag-dinner">ужин</span>');
      li.innerHTML = `
        <div class="dish-info">
          <div class="dish-name"></div>
          <div class="dish-tags">${tags.join("")}</div>
        </div>
        <button class="delete-btn" data-idx="${idx}" title="Удалить">🗑</button>
      `;
      li.querySelector(".dish-name").textContent = dish.name;
      // Clicking the item (not delete) suggests it directly
      li.addEventListener("click", (e) => {
        if (e.target.closest(".delete-btn")) return;
        // Use this dish as current suggestion
        lastSuggested = dish.name;
        const label = currentMeal === "lunch" ? "На обед" : "На ужин";
        $("suggestionLabel").textContent = label;
        $("suggestionDish").textContent = dish.name;
        $("suggestionDish").classList.remove("empty");
        closeModal("listModal");
        updateSuggestBtn();
      });
      list.appendChild(li);
    });
    list.querySelectorAll(".delete-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.idx);
        const name = dishes[idx].name;
        if (confirm(`Удалить «${name}»?`)) {
          dishes.splice(idx, 1);
          saveDishes();
          renderList();
          updateHint();
          updateSuggestBtn();
        }
      });
    });
  }

  function openModal(id) {
    $(id).classList.add("open");
    document.body.style.overflow = "hidden";
  }
  function closeModal(id) {
    $(id).classList.remove("open");
    document.body.style.overflow = "";
  }

  function resetAddForm() {
    $("newDishName").value = "";
    $("lunchCheck").checked = true;
    $("dinnerCheck").checked = false;
    $("lunchCheckLabel").classList.add("checked");
    $("dinnerCheckLabel").classList.remove("checked");
  }

  // ---------- Event wiring ----------
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      currentMeal = tab.dataset.meal;
      renderTabs();
    });
  });

  $("suggestBtn").addEventListener("click", suggest);

  $("listBtn").addEventListener("click", () => {
    renderList();
    openModal("listModal");
  });

  $("addBtn").addEventListener("click", () => {
    resetAddForm();
    openModal("addModal");
    setTimeout(() => $("newDishName").focus(), 100);
  });

  document.querySelectorAll("[data-close]").forEach(btn => {
    btn.addEventListener("click", () => closeModal(btn.dataset.close));
  });

  document.querySelectorAll(".modal-overlay").forEach(overlay => {
    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) closeModal(overlay.id);
    });
  });

  // Checkbox toggle visuals
  function wireCheckbox(checkId, labelId) {
    const check = $(checkId);
    const label = $(labelId);
    label.addEventListener("click", (e) => {
      e.preventDefault();
      check.checked = !check.checked;
      label.classList.toggle("checked", check.checked);
    });
  }
  wireCheckbox("lunchCheck", "lunchCheckLabel");
  wireCheckbox("dinnerCheck", "dinnerCheckLabel");

  $("saveBtn").addEventListener("click", () => {
    const name = $("newDishName").value.trim();
    const lunch = $("lunchCheck").checked;
    const dinner = $("dinnerCheck").checked;
    if (!name) {
      alert("Введи название блюда");
      return;
    }
    if (!lunch && !dinner) {
      alert("Выбери хотя бы один прием пищи");
      return;
    }
    // Check duplicate
    if (dishes.some(d => d.name.toLowerCase() === name.toLowerCase())) {
      if (!confirm(`«${name}» уже есть. Добавить ещё раз?`)) return;
    }
    dishes.push({ name, lunch, dinner });
    saveDishes();
    closeModal("addModal");
    updateHint();
    updateSuggestBtn();
  });

  // Allow Enter to save
  $("newDishName").addEventListener("keydown", (e) => {
    if (e.key === "Enter") $("saveBtn").click();
  });

  // Initial render
  renderTabs();
</script>
</body>
</html>
