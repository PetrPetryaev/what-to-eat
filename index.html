<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ff7043">
<title>Что поесть?</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Helvetica Neue", Arial, sans-serif;
    background: #faf8f5;
    min-height: 100vh;
    color: #1c1c1c;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "kern", "liga", "ss01";
    touch-action: manipulation;
  }
  button, .tab, .dish-item, .checkbox-label, .close-btn { touch-action: manipulation; }
  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 32px 20px 100px;
    min-height: 100vh;
  }
  h1 {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.03em;
    margin: 0 0 28px;
    color: #1c1c1c;
    text-align: left;
    line-height: 1.1;
  }
  .tabs {
    display: flex;
    gap: 0;
    background: #f0ece5;
    padding: 3px;
    border-radius: 10px;
    margin-bottom: 16px;
  }
  .tab {
    flex: 1;
    padding: 9px 12px;
    border: none;
    background: transparent;
    font-size: 14px;
    font-weight: 500;
    color: #8a8680;
    border-radius: 8px;
    cursor: pointer;
    transition: color 0.12s, background 0.12s;
    letter-spacing: -0.01em;
    font-family: inherit;
  }
  .tab.active {
    background: #ffffff;
    color: #1c1c1c;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .suggestion-card {
    background: #ffffff;
    border: 1px solid #ece7de;
    border-radius: 14px;
    padding: 56px 24px;
    text-align: center;
    margin-bottom: 14px;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: transform 0.2s ease;
  }
  .suggestion-card.animate { transform: scale(1.005); }
  .suggestion-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: #a8a39a;
    margin-bottom: 14px;
    font-weight: 500;
  }
  .suggestion-dish {
    font-size: 30px;
    font-weight: 600;
    color: #1c1c1c;
    line-height: 1.2;
    letter-spacing: -0.025em;
    min-height: 36px;
  }
  .suggestion-dish.empty {
    font-size: 17px;
    color: #a8a39a;
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  .btn {
    width: 100%;
    padding: 14px 16px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.12s ease;
    -webkit-appearance: none;
    letter-spacing: -0.01em;
    font-family: inherit;
  }
  .btn-primary {
    background: #1c1c1c;
    color: #ffffff;
    margin-bottom: 8px;
  }
  .btn-primary:active {
    background: #000000;
    transform: scale(0.995);
  }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary {
    background: #ffffff;
    color: #1c1c1c;
    border: 1px solid #ece7de;
    margin-bottom: 8px;
  }
  .btn-secondary:active { background: #f5f1e9; }
  .btn-ghost {
    background: transparent;
    color: #8a8680;
    padding: 10px;
    font-size: 14px;
    font-weight: 400;
  }
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  .row .btn { margin-bottom: 0; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(28, 28, 28, 0.38);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
    animation: fade 0.2s;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .modal-overlay.open { display: flex; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: #ffffff;
    width: 100%;
    max-width: 480px;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid #f0ece5;
  }
  .modal-title {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.015em;
    color: #1c1c1c;
  }
  .close-btn {
    background: transparent;
    border: none;
    width: 28px;
    height: 28px;
    font-size: 16px;
    cursor: pointer;
    color: #a8a39a;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    border-radius: 6px;
    transition: color 0.12s, background 0.12s;
  }
  .close-btn:hover { color: #1c1c1c; background: #f5f1e9; }
  .dish-list { list-style: none; padding: 0; margin: 0; }
  .dish-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 10px;
    border-radius: 8px;
    margin-bottom: 2px;
    background: transparent;
    cursor: pointer;
    transition: background 0.12s;
  }
  .dish-item:active, .dish-item:hover { background: #f5f1e9; }
  .dish-info { flex: 1; min-width: 0; }
  .dish-name {
    font-size: 15px;
    font-weight: 500;
    color: #1c1c1c;
    word-break: break-word;
    letter-spacing: -0.01em;
  }
  .dish-tags {
    display: flex;
    gap: 4px;
    margin-top: 5px;
  }
  .tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .tag-lunch { background: #f0ece5; color: #8a8680; }
  .tag-dinner { background: #e4ded2; color: #625d54; }
  .delete-btn {
    background: transparent;
    border: none;
    font-size: 14px;
    color: #c4beb2;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 6px;
    transition: color 0.12s;
  }
  .delete-btn:hover { color: #1c1c1c; }

  /* Form */
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: #8a8680;
    margin-bottom: 7px;
    letter-spacing: -0.005em;
    text-transform: none;
  }
  .form-input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #ece7de;
    border-radius: 10px;
    font-size: 16px;
    background: #ffffff;
    color: #1c1c1c;
    font-family: inherit;
    letter-spacing: -0.01em;
    -webkit-appearance: none;
    transition: border-color 0.12s;
  }
  .form-input:focus {
    outline: none;
    border-color: #1c1c1c;
  }
  .form-input::placeholder { color: #c4beb2; }
  .checkbox-group {
    display: flex;
    gap: 8px;
  }
  .checkbox-label {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    background: #ffffff;
    border: 1px solid #ece7de;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 500;
    font-size: 14px;
    color: #8a8680;
    user-select: none;
    transition: all 0.12s;
    letter-spacing: -0.01em;
  }
  .checkbox-label input { display: none; }
  .checkbox-label.checked {
    background: #1c1c1c;
    border-color: #1c1c1c;
    color: #ffffff;
  }
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #a8a39a;
    font-size: 14px;
  }
  .hint {
    text-align: center;
    font-size: 12px;
    color: #a8a39a;
    margin-top: 16px;
    letter-spacing: -0.005em;
  }
</style>
</head>
<body>
<div class="app">
  <h1>Что поесть?</h1>

  <div class="tabs">
    <button class="tab active" data-meal="lunch">Обед</button>
    <button class="tab" data-meal="dinner">Ужин</button>
  </div>

  <div class="suggestion-card" id="suggestionCard">
    <div class="suggestion-label" id="suggestionLabel">На обед</div>
    <div class="suggestion-dish empty" id="suggestionDish">Нажмите «Предложить»</div>
  </div>

  <button class="btn btn-primary" id="suggestBtn">Предложить</button>

  <div class="row">
    <button class="btn btn-secondary" id="listBtn">Список</button>
    <button class="btn btn-secondary" id="addBtn">Добавить</button>
  </div>

  <div class="hint" id="hint"></div>
</div>

<!-- List modal -->
<div class="modal-overlay" id="listModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Все блюда</div>
      <button class="close-btn" data-close="listModal">✕</button>
    </div>
    <ul class="dish-list" id="dishList"></ul>
  </div>
</div>

<!-- Add modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Новое блюдо</div>
      <button class="close-btn" data-close="addModal">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Название</label>
      <input type="text" class="form-input" id="newDishName" placeholder="например, борщ" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">Когда предлагать</label>
      <div class="checkbox-group">
        <label class="checkbox-label checked" id="lunchCheckLabel">
          <input type="checkbox" id="lunchCheck" checked>
          Обед
        </label>
        <label class="checkbox-label" id="dinnerCheckLabel">
          <input type="checkbox" id="dinnerCheck">
          Ужин
        </label>
      </div>
    </div>
    <button class="btn btn-primary" id="saveBtn">Сохранить</button>
    <button class="btn btn-ghost" data-close="addModal">Отмена</button>
  </div>
</div>

<script>
  // ---------- Seed data ----------
  const DEFAULT_DISHES = [
    { name: "тыквенный суп",           lunch: true,  dinner: false },
    { name: "греческий салат",         lunch: true,  dinner: false },
    { name: "макароны с филе",         lunch: true,  dinner: false },
    { name: "пельмени",                lunch: true,  dinner: false },
    { name: "булгур с мясом",          lunch: true,  dinner: false },
    { name: "гречка с мясом",          lunch: true,  dinner: false },
    { name: "заказать роллы",          lunch: true,  dinner: true  },
    { name: "заказать пиццу",          lunch: true,  dinner: true  },
    { name: "заказать бургеры",        lunch: true,  dinner: true  },
    { name: "заказать вафли",          lunch: true,  dinner: false },
    { name: "заказать грузинскую кухню", lunch: true, dinner: true },
    { name: "пожарить овощную смесь с мясом", lunch: true, dinner: false },
    { name: "плов",                    lunch: true,  dinner: false },
    { name: "рис с курицей",           lunch: true,  dinner: false },
    { name: "котлеты с пюре",          lunch: true,  dinner: false },
    { name: "лазанья",                 lunch: true,  dinner: false },
    { name: "салат с тунцом",          lunch: true,  dinner: false },
    { name: "пожарить сырники",        lunch: false, dinner: true  },
    { name: "пожарить оладьи",         lunch: false, dinner: true  },
    { name: "посмотреть что осталось с обеда", lunch: false, dinner: true },
    { name: "жареные овощи с мясом",   lunch: false, dinner: true  },
    { name: "омлет",                   lunch: false, dinner: true  },
  ];

  const STORAGE_KEY = "food_app_dishes_v1";

  // ---------- State ----------
  let dishes = loadDishes();
  let currentMeal = "lunch"; // "lunch" | "dinner"
  let lastSuggested = null;

  // ---------- Persistence ----------
  function loadDishes() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) { console.warn("load error", e); }
    return [...DEFAULT_DISHES];
  }
  function saveDishes() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(dishes)); }
    catch (e) { console.warn("save error", e); }
  }

  // ---------- Rendering ----------
  const $ = (id) => document.getElementById(id);

  function filterForMeal(meal) {
    return dishes.filter(d => meal === "lunch" ? d.lunch : d.dinner);
  }

  function suggest() {
    const pool = filterForMeal(currentMeal);
    if (pool.length === 0) {
      $("suggestionLabel").textContent = "Список пуст";
      $("suggestionDish").textContent = "Добавь блюдо";
      $("suggestionDish").classList.add("empty");
      return;
    }
    // Avoid repeating the same dish twice if possible
    let pick;
    if (pool.length > 1 && lastSuggested) {
      const filtered = pool.filter(d => d.name !== lastSuggested);
      pick = filtered[Math.floor(Math.random() * filtered.length)];
    } else {
      pick = pool[Math.floor(Math.random() * pool.length)];
    }
    lastSuggested = pick.name;

    const label = currentMeal === "lunch" ? "На обед" : "На ужин";
    $("suggestionLabel").textContent = label;
    const dishEl = $("suggestionDish");
    dishEl.textContent = pick.name;
    dishEl.classList.remove("empty");

    const card = $("suggestionCard");
    card.classList.add("animate");
    setTimeout(() => card.classList.remove("animate"), 200);
  }

  function renderTabs() {
    document.querySelectorAll(".tab").forEach(t => {
      t.classList.toggle("active", t.dataset.meal === currentMeal);
    });
    // Reset card when switching
    const label = currentMeal === "lunch" ? "На обед" : "На ужин";
    const placeholder = "Нажмите «Предложить»";
    $("suggestionLabel").textContent = label;
    const dishEl = $("suggestionDish");
    dishEl.textContent = placeholder;
    dishEl.classList.add("empty");
    lastSuggested = null;
    updateSuggestBtn();
    updateHint();
  }

  function updateSuggestBtn() {
    const pool = filterForMeal(currentMeal);
    $("suggestBtn").textContent = lastSuggested ? "Другой вариант" : "Предложить";
    $("suggestBtn").disabled = pool.length === 0;
    $("suggestBtn").style.opacity = pool.length === 0 ? "0.5" : "1";
  }

  function updateHint() {
    const pool = filterForMeal(currentMeal);
    $("hint").textContent = `${pool.length} вариант${pluralize(pool.length)} в списке`;
  }
  function pluralize(n) {
    const mod10 = n % 10, mod100 = n % 100;
    if (mod10 === 1 && mod100 !== 11) return "";
    if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return "а";
    return "ов";
  }

  function renderList() {
    const list = $("dishList");
    list.innerHTML = "";
    if (dishes.length === 0) {
      list.innerHTML = '<div class="empty-state">Список пуст.<br>Добавь первое блюдо!</div>';
      return;
    }
    // Sort by name
    const sorted = [...dishes].sort((a, b) => a.name.localeCompare(b.name, "ru"));
    sorted.forEach((dish) => {
      const idx = dishes.indexOf(dish);
      const li = document.createElement("li");
      li.className = "dish-item";
      const tags = [];
      if (dish.lunch) tags.push('<span class="tag tag-lunch">обед</span>');
      if (dish.dinner) tags.push('<span class="tag tag-dinner">ужин</span>');
      li.innerHTML = `
        <div class="dish-info">
          <div class="dish-name"></div>
          <div class="dish-tags">${tags.join("")}</div>
        </div>
        <button class="delete-btn" data-idx="${idx}" title="Удалить">🗑</button>
      `;
      li.querySelector(".dish-name").textContent = dish.name;
      // Clicking the item (not delete) suggests it directly
      li.addEventListener("click", (e) => {
        if (e.target.closest(".delete-btn")) return;
        // Use this dish as current suggestion
        lastSuggested = dish.name;
        const label = currentMeal === "lunch" ? "На обед" : "На ужин";
        $("suggestionLabel").textContent = label;
        $("suggestionDish").textContent = dish.name;
        $("suggestionDish").classList.remove("empty");
        closeModal("listModal");
        updateSuggestBtn();
      });
      list.appendChild(li);
    });
    list.querySelectorAll(".delete-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.idx);
        const name = dishes[idx].name;
        if (confirm(`Удалить «${name}»?`)) {
          dishes.splice(idx, 1);
          saveDishes();
          renderList();
          updateHint();
          updateSuggestBtn();
        }
      });
    });
  }

  function openModal(id) {
    $(id).classList.add("open");
    document.body.style.overflow = "hidden";
  }
  function closeModal(id) {
    $(id).classList.remove("open");
    document.body.style.overflow = "";
  }

  function resetAddForm() {
    $("newDishName").value = "";
    $("lunchCheck").checked = true;
    $("dinnerCheck").checked = false;
    $("lunchCheckLabel").classList.add("checked");
    $("dinnerCheckLabel").classList.remove("checked");
  }

  // ---------- Event wiring ----------
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      currentMeal = tab.dataset.meal;
      renderTabs();
    });
  });

  $("suggestBtn").addEventListener("click", suggest);

  $("listBtn").addEventListener("click", () => {
    renderList();
    openModal("listModal");
  });

  $("addBtn").addEventListener("click", () => {
    resetAddForm();
    openModal("addModal");
    setTimeout(() => $("newDishName").focus(), 100);
  });

  document.querySelectorAll("[data-close]").forEach(btn => {
    btn.addEventListener("click", () => closeModal(btn.dataset.close));
  });

  document.querySelectorAll(".modal-overlay").forEach(overlay => {
    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) closeModal(overlay.id);
    });
  });

  // Checkbox toggle visuals
  function wireCheckbox(checkId, labelId) {
    const check = $(checkId);
    const label = $(labelId);
    label.addEventListener("click", (e) => {
      e.preventDefault();
      check.checked = !check.checked;
      label.classList.toggle("checked", check.checked);
    });
  }
  wireCheckbox("lunchCheck", "lunchCheckLabel");
  wireCheckbox("dinnerCheck", "dinnerCheckLabel");

  $("saveBtn").addEventListener("click", () => {
    const name = $("newDishName").value.trim();
    const lunch = $("lunchCheck").checked;
    const dinner = $("dinnerCheck").checked;
    if (!name) {
      alert("Введи название блюда");
      return;
    }
    if (!lunch && !dinner) {
      alert("Выбери хотя бы один прием пищи");
      return;
    }
    // Check duplicate
    if (dishes.some(d => d.name.toLowerCase() === name.toLowerCase())) {
      if (!confirm(`«${name}» уже есть. Добавить ещё раз?`)) return;
    }
    dishes.push({ name, lunch, dinner });
    saveDishes();
    closeModal("addModal");
    updateHint();
    updateSuggestBtn();
  });

  // Allow Enter to save
  $("newDishName").addEventListener("keydown", (e) => {
    if (e.key === "Enter") $("saveBtn").click();
  });

  // Initial render
  renderTabs();
</script>
</body>
</html>
